<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Treestagram{% endblock %}</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #1a3a2a;
      --green-mid:    #2d6a4f;
      --green-light:  #52b788;
      --green-pale:   #b7e4c7;
      --green-bg:     #f0f7f4;
      --bark:         #8b5e3c;
      --bark-light:   #c9a87c;
      --white:        #ffffff;
      --text:         #1a2e22;
      --text-muted:   #5a7a65;
      --border:       #c8dfd2;
      --error:        #c0392b;
      --success:      #27ae60;
      --shadow:       0 4px 24px rgba(26,58,42,0.10);
      --radius:       14px;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--green-bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Navbar ── */
    .navbar {
      background: var(--green-dark);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar-brand {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--green-pale);
      text-decoration: none;
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-brand span.leaf { font-size: 1.6rem; }
    .navbar-links { display: flex; gap: 1rem; align-items: center; }
    .navbar-links a {
      color: var(--green-pale);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .navbar-links a:hover { background: rgba(255,255,255,0.12); }
    .navbar-links a.btn-outline {
      border: 1.5px solid var(--green-pale);
    }
    .navbar-links a.btn-fill {
      background: var(--green-light);
      color: var(--green-dark);
      font-weight: 700;
    }
    .navbar-links a.btn-fill:hover { background: var(--green-pale); }

    /* ── Messages ── */
    .messages-container {
      max-width: 480px;
      margin: 1.2rem auto 0;
      padding: 0 1rem;
    }
    .message {
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 8px;
      font-weight: 500;
    }
    .message.success { background: #d4edda; color: #155724; border-left: 4px solid var(--success); }
    .message.error   { background: #f8d7da; color: #721c24; border-left: 4px solid var(--error); }
    .message.info    { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }

    /* ── Shared form card ── */
    .auth-page {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background:
        radial-gradient(ellipse at 10% 80%, rgba(82,183,136,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 90% 10%, rgba(45,106,79,0.15) 0%, transparent 55%),
        var(--green-bg);
    }
    .auth-card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 2.5rem 2.5rem 2rem;
      border: 1px solid var(--border);
    }
    .auth-logo {
      text-align: center;
      margin-bottom: 1.6rem;
    }
    .auth-logo .logo-icon {
      font-size: 2.8rem;
      display: block;
      margin-bottom: 4px;
    }
    .auth-logo h1 {
      font-size: 1.7rem;
      font-weight: 800;
      color: var(--green-dark);
      letter-spacing: -0.5px;
    }
    .auth-logo p {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .auth-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 1.4rem 0;
    }

    /* ── Form fields ── */
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
      color: var(--text);
      background: #fafcfb;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .form-input:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(82,183,136,0.15);
      background: var(--white);
    }
    .form-input.error-field { border-color: var(--error); }

    .field-errors {
      margin-top: 4px;
    }
    .field-errors li {
      list-style: none;
      font-size: 0.8rem;
      color: var(--error);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--green-mid);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover  { background: var(--green-dark); }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Footer link ── */
    .auth-footer {
      text-align: center;
      margin-top: 1.4rem;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .auth-footer a {
      color: var(--green-mid);
      font-weight: 600;
      text-decoration: none;
    }
    .auth-footer a:hover { text-decoration: underline; }

    /* ── Home page ── */
    .home-container {
      max-width: 680px;
      margin: 3rem auto;
      padding: 0 1.5rem;
      text-align: center;
    }
    .welcome-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
    .welcome-card .big-tree { font-size: 4rem; margin-bottom: 1rem; }
    .welcome-card h2 {
      font-size: 1.8rem;
      color: var(--green-dark);
      margin-bottom: 0.5rem;
    }
    .welcome-card p { color: var(--text-muted); margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-standard  { background: #e8f5e9; color: #2d6a4f; }
    .badge-credible  { background: #fff3cd; color: #856404; }
    .badge-caretaker { background: #cce5ff; color: #004085; }
    .badge-admin     { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="{% url 'svelte_app' %}" class="navbar-brand">
    <span class="leaf">🌳</span> Treestagram
  </a>
  <div class="navbar-links">
    {% if user.is_authenticated %}
      <span style="color:var(--green-pale);font-size:.9rem;">Hey, {{ user.username }}!</span>
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}" class="btn-outline">Log in</a>
      <a href="{% url 'signup' %}" class="btn-fill">Sign up</a>
    {% endif %}
  </div>
</nav>

{% if messages %}
<div class="messages-container">
  {% for message in messages %}
    <div class="message {{ message.tags }}">{{ message }}</div>
  {% endfor %}
</div>
{% endif %}

{% block content %}{% endblock %}

</body>
</html>
